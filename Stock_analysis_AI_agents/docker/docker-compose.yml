services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stockagent
      POSTGRES_USER: stockagent
      POSTGRES_PASSWORD: stockagent
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockagent -d stockagent"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8005:8005"
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: stockagent
      POSTGRES_USER: stockagent
      POSTGRES_PASSWORD: stockagent
    restart: unless-stopped

volumes:
  postgres_data:
