name = "krishna-assistant"
main = "src/worker.ts"
compatibility_date = "2024-01-01"

# ---------------------------------------------------------------------------
# KV Namespace for session history (TTL 1h per key)
# Create with: wrangler kv namespace create HISTORY_KV
# Then paste the returned ID below.
# ---------------------------------------------------------------------------
[[kv_namespaces]]
binding = "HISTORY_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# ---------------------------------------------------------------------------
# Secrets — set via CLI, never stored here:
#   wrangler secret put OPENAI_API_KEY
#   wrangler secret put SUPABASE_URL
#   wrangler secret put SUPABASE_SERVICE_KEY
#   wrangler secret put GROQ_API_KEY
#   wrangler secret put API_KEY
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Optional: custom domain route
# Uncomment and fill in after adding domain to Cloudflare.
# ---------------------------------------------------------------------------
# [[routes]]
# pattern = "assistant.yourdomain.com/*"
# zone_name = "yourdomain.com"
