services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: finagent
      POSTGRES_USER: finagent
      POSTGRES_PASSWORD: finagent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finagent -d finagent"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: ../..
      dockerfile: finagent/docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: finagent
      POSTGRES_USER: finagent
      POSTGRES_PASSWORD: finagent
    restart: unless-stopped

volumes:
  postgres_data:
